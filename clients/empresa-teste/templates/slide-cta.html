<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #f8f5f0; }
  .canvas { position: relative; width: 1080px; height: 1350px; overflow: hidden; }

  .bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(180deg, rgba(124,185,160,0.85) 0%, rgba(124,185,160,0.92) 50%, rgba(45,45,45,0.88) 100%);
    z-index: 1;
  }

  .glow {
    position: absolute; top: 30%; left: 50%; transform: translate(-50%,-50%);
    width: 700px; height: 700px;
    background: radial-gradient(ellipse, rgba(248,245,240,0.18) 0%, transparent 70%);
    z-index: 2;
  }

  .conteudo {
    position: relative; z-index: 3; padding: 80px 64px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    height: 100%; text-align: center;
  }

  .headline {
    font-family: 'Playfair Display', serif; font-weight: 900;
    font-size: 90px; line-height: 0.92;
    margin-bottom: 36px;
  }
  .headline .l1 { color: #fff; display: block; text-shadow: 0 4px 24px rgba(0,0,0,0.2); }
  .headline .l2 { color: #e8f5f0; display: block; text-shadow: 0 4px 24px rgba(0,0,0,0.2); }

  .body-text {
    font-family: 'Nunito', sans-serif; font-size: 28px; line-height: 1.45;
    color: rgba(255,255,255,0.88); margin-bottom: 56px; max-width: 780px; font-weight: 400;
  }

  .cta-btn {
    display: inline-block; padding: 26px 72px;
    background: #e8a598;
    border-radius: 60px; font-family: 'Nunito', sans-serif;
    font-size: 26px; font-weight: 800; color: #fff;
    letter-spacing: 0.05em;
    box-shadow: 0 8px 32px rgba(232,165,152,0.4), 0 2px 8px rgba(0,0,0,0.15);
  }

  .rodape {
    position: absolute; bottom: 0; width: 100%; height: 72px; z-index: 4;
    display: flex; align-items: center; justify-content: center;
    background: rgba(45,45,45,0.7); border-top: 1px solid rgba(255,255,255,0.1);
  }
  .rodape .logo { height: 36px; width: auto; filter: brightness(0) invert(1); }
  .rodape .nome {
    font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700;
    color: rgba(255,255,255,0.7); letter-spacing: 0.15em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="canvas">
  <img class="bg" src="{{BG_JPG_PATH}}" alt="">
  <div class="overlay"></div>
  <div class="glow"></div>
  <div class="conteudo">
    <div class="headline">
      <span class="l1">{{ZONA_HEADLINE_L1}}</span>
      <span class="l2">{{ZONA_HEADLINE_L2}}</span>
    </div>
    <div class="body-text">{{ZONA_BODY}}</div>
    <div class="cta-btn">{{ZONA_CTA}}</div>
  </div>
  <div class="rodape">
    <img class="logo" src="/logo.png" alt="Pilates Studio">
  </div>
</div>
</body>
</html>
