<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #f8f5f0; }
  .canvas { position: relative; width: 1080px; height: 1350px; overflow: hidden; }

  .bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }

  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(180deg, rgba(248,245,240,0.15) 0%, rgba(248,245,240,0.7) 70%, rgba(248,245,240,0.95) 100%);
    z-index: 1;
  }

  .texto {
    position: absolute; bottom: 120px; left: 0; right: 0; z-index: 2;
    padding: 0 64px;
  }

  .label {
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700;
    letter-spacing: 0.35em; text-transform: uppercase; color: #7cb9a0;
    margin-bottom: 20px; display: inline-flex; align-items: center; gap: 12px;
  }
  .label::before {
    content: ''; display: inline-block; width: 32px; height: 2px; background: #7cb9a0;
  }

  .headline {
    font-family: 'Playfair Display', serif; font-weight: 900;
    font-size: 90px; line-height: 0.95;
    letter-spacing: -0.01em;
  }
  .headline .l1 { color: #2d2d2d; display: block; }
  .headline .l2 { color: #7cb9a0; display: block; }

  .sub {
    font-family: 'Nunito', sans-serif; font-size: 24px; color: #a0a0a0;
    margin-top: 24px; font-weight: 400; line-height: 1.4; max-width: 75%;
  }

  .divider {
    position: absolute; bottom: 110px; left: 64px; width: 60px; height: 3px;
    background: #e8a598; z-index: 2;
  }

  .rodape {
    position: absolute; bottom: 0; width: 100%; height: 72px; z-index: 3;
    display: flex; align-items: center; justify-content: center;
    background: rgba(124,185,160,0.12); border-top: 1px solid rgba(124,185,160,0.25);
  }
  .rodape .logo { height: 36px; width: auto; }
  .rodape .nome {
    font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700;
    color: #7cb9a0; letter-spacing: 0.15em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="canvas">
  <img class="bg" src="{{CAPA_JPG_PATH}}" alt="">
  <div class="overlay"></div>
  <div class="texto">
    <div class="label">{{ZONA_LABEL}}</div>
    <div class="headline">
      <span class="l1">{{ZONA_HEADLINE_L1}}</span>
      <span class="l2">{{ZONA_HEADLINE_L2}}</span>
    </div>
    <div class="sub">{{ZONA_SUB}}</div>
  </div>
  <div class="rodape">
    <img class="logo" src="/logo.png" alt="Pilates Studio">
  </div>
</div>
</body>
</html>
