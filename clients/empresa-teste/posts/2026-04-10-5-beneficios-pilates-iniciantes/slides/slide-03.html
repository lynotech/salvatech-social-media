<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #f8f5f0; }
  .canvas { position: relative; width: 1080px; height: 1350px; overflow: hidden; }

  .bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(248,245,240,0.82); z-index: 1;
  }

  .card {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 3;
    background: rgba(255,255,255,0.88); border: 1px solid rgba(124,185,160,0.3);
    border-radius: 28px; padding: 64px; max-width: 920px; width: 90%;
    backdrop-filter: blur(12px);
    box-shadow: 0 24px 60px rgba(124,185,160,0.12), 0 2px 8px rgba(0,0,0,0.06);
    border-top: 4px solid #7cb9a0;
  }

  .label {
    font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700;
    letter-spacing: 0.3em; text-transform: uppercase; color: #7cb9a0;
    margin-bottom: 28px; display: flex; align-items: center; gap: 14px;
  }
  .label::before {
    content: ''; display: block; width: 36px; height: 3px; background: #e8a598; flex-shrink: 0;
  }

  .headline {
    font-family: 'Playfair Display', serif; font-weight: 900;
    font-size: 58px; line-height: 1.05; color: #2d2d2d;
    margin-bottom: 32px;
  }

  .body-text {
    font-family: 'Nunito', sans-serif; font-size: 26px; line-height: 1.55;
    color: #555; font-weight: 400;
  }

  .rodape {
    position: absolute; bottom: 0; width: 100%; height: 72px; z-index: 4;
    display: flex; align-items: center; justify-content: center;
    background: rgba(124,185,160,0.12); border-top: 1px solid rgba(124,185,160,0.25);
  }
  .rodape .logo { height: 36px; width: auto; }
  .rodape .nome {
    font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700;
    color: #7cb9a0; letter-spacing: 0.15em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="canvas">
  <img class="bg" src="/clients/empresa-teste/posts/2026-04-10-5-beneficios-pilates-iniciantes/assets/background.jpg" alt="">
  <div class="overlay"></div>
  <div class="card">
    <div class="label">A solução existe</div>
    <div class="headline">Pilates: método para todos os níveis 💪</div>
    <div class="body-text">Não precisa ser atleta. Do zero ao avançado, o pilates se adapta a você.</div>
  </div>
  <div class="rodape">
    <img class="logo" src="/clients/empresa-teste/assets/logo.png" alt="Pilates Studio">
  </div>
</div>
</body>
</html>
