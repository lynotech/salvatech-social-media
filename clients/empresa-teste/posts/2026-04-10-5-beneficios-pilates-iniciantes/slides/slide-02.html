<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #f8f5f0; }
  .canvas { position: relative; width: 1080px; height: 1350px; overflow: hidden; }

  .bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, rgba(248,245,240,0.92) 0%, rgba(248,245,240,0.78) 60%, rgba(181,213,200,0.55) 100%);
    z-index: 1;
  }

  .num-deco {
    position: absolute; right: 48px; bottom: 80px;
    font-family: 'Playfair Display', serif; font-size: 320px;
    color: #7cb9a0; opacity: 0.07; font-weight: 900; z-index: 2; line-height: 1;
  }

  .conteudo {
    position: relative; z-index: 3; padding: 0 72px;
    display: flex; flex-direction: column; justify-content: center; height: 100%;
  }

  .label {
    font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700;
    letter-spacing: 0.3em; text-transform: uppercase; color: #7cb9a0;
    margin-bottom: 32px; display: flex; align-items: center; gap: 16px;
  }
  .label::before {
    content: ''; display: block; width: 48px; height: 3px; background: #7cb9a0; flex-shrink: 0;
  }

  .headline {
    font-family: 'Playfair Display', serif; font-weight: 900;
    font-size: 62px; line-height: 1.05; color: #2d2d2d;
    margin-bottom: 36px;
  }

  .body-text {
    font-family: 'Nunito', sans-serif; font-size: 28px; line-height: 1.55;
    color: #555; max-width: 820px; font-weight: 400;
  }

  .rodape {
    position: absolute; bottom: 0; width: 100%; height: 72px; z-index: 4;
    display: flex; align-items: center; justify-content: center;
    background: rgba(124,185,160,0.12); border-top: 1px solid rgba(124,185,160,0.25);
  }
  .rodape .logo { height: 36px; width: auto; }
  .rodape .nome {
    font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700;
    color: #7cb9a0; letter-spacing: 0.15em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="canvas">
  <img class="bg" src="/clients/empresa-teste/posts/2026-04-10-5-beneficios-pilates-iniciantes/assets/background.jpg" alt="">
  <div class="overlay"></div>
  <div class="num-deco">02</div>
  <div class="conteudo">
    <div class="label">Você se identifica?</div>
    <div class="headline">Dor nas costas, cansaço e estresse todo dia</div>
    <div class="body-text">O corpo dá sinais quando precisa de atenção. Ignorar só piora.</div>
  </div>
  <div class="rodape">
    <img class="logo" src="/clients/empresa-teste/assets/logo.png" alt="Pilates Studio">
  </div>
</div>
</body>
</html>
