<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Syne:wght@800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #0a0414; }

  .canvas { position: relative; width: 1080px; height: 1350px; overflow: hidden; }

  .bg-slice {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 0;
  }
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,4,20,0.72); z-index: 1;
  }
  .noise {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0.03; z-index: 5; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  /* Glow orb behind CTA */
  .glow-orb {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%);
    width: 500px; height: 500px;
    background: radial-gradient(ellipse, rgba(151,85,255,0.15) 0%, transparent 70%);
    z-index: 2; pointer-events: none;
  }

  .conteudo {
    position: relative; z-index: 3;
    padding: 80px 56px; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    height: 100%; text-align: center;
  }

  .headline {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 68px; line-height: 0.95;
    text-transform: uppercase; margin-bottom: 28px;
    letter-spacing: -0.02em;
  }
  .headline .l1 {
    color: #ffffff; display: block;
    text-shadow: 0 0 80px rgba(255,255,255,0.08);
  }
  .headline .l2 {
    color: #9755FF; display: block;
    text-shadow: 0 0 60px rgba(151,85,255,0.25);
  }

  .body-text {
    font-family: 'Outfit', sans-serif;
    font-size: 22px; line-height: 1.5; color: #c4b5e0;
    margin-bottom: 44px; max-width: 750px; font-weight: 300;
  }

  .cta-btn {
    display: inline-block; padding: 22px 56px;
    background: linear-gradient(135deg, #9755FF 0%, #7a3de8 100%);
    border-radius: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800; color: #ffffff;
    text-transform: uppercase; letter-spacing: 0.08em;
    box-shadow:
      0 0 0 1px rgba(151,85,255,0.3),
      0 8px 32px rgba(151,85,255,0.25),
      0 2px 8px rgba(0,0,0,0.3);
  }

  .rodape {
    position: absolute; bottom: 0; width: 100%; height: 60px; z-index: 6;
    border-top: 1px solid rgba(151,85,255,0.2);
    padding: 0 56px; display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,4,20,0.92);
    backdrop-filter: blur(8px);
  }
  .rodape .logo { height: 24px; width: auto; opacity: 0.9; }
  .rodape .num {
    font-family: 'Outfit', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(151,85,255,0.6);
  }
</style>
</head>
<body>
<div class="canvas">
  <img class="bg-slice" src="../assets/slices/slice-07.jpg" alt="">
  <div class="overlay"></div>
  <div class="noise"></div>
  <div class="glow-orb"></div>
  <div class="conteudo">
    <div class="headline">
      <span class="l1">RECONHECEU</span>
      <span class="l2">ALGUM DESSES?</span>
    </div>
    <div class="body-text">Um diagnóstico rápido pode mostrar o que está travando sua operação.</div>
    <div class="cta-btn">COMENTA "SISTEMA" OU DM</div>
  </div>
  <div class="rodape">
    <img class="logo" src="../../../logo.png" alt="SalvaTech">
    <span class="num">07 / 07</span>
  </div>
</div>
</body>
</html>
