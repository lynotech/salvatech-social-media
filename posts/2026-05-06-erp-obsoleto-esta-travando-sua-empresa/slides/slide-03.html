<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Syne:wght@800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #0a0414; }

  .canvas { position: relative; width: 1080px; height: 1350px; overflow: hidden; }

  .bg-slice {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 0;
  }
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,4,20,0.62); z-index: 1;
  }
  .noise {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0.03; z-index: 5; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  .card {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 3;
    background: rgba(10,4,20,0.75);
    border: 1px solid rgba(151,85,255,0.15);
    border-radius: 20px; padding: 52px; max-width: 880px; width: 88%;
    backdrop-filter: blur(12px);
    box-shadow:
      0 0 0 1px rgba(151,85,255,0.08),
      0 24px 80px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.03);
  }

  .label {
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.25em;
    text-transform: uppercase; color: #9755FF;
    margin-bottom: 24px;
    padding-left: 20px;
    border-left: 3px solid #9755FF;
  }

  .headline {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 48px; line-height: 1.05;
    text-transform: uppercase; color: #ffffff;
    margin-bottom: 28px;
    letter-spacing: -0.01em;
  }

  .body-text {
    font-family: 'Outfit', sans-serif;
    font-size: 21px; line-height: 1.6; color: #c4b5e0;
    font-weight: 300;
  }

  .rodape {
    position: absolute; bottom: 0; width: 100%; height: 60px; z-index: 6;
    border-top: 1px solid rgba(151,85,255,0.2);
    padding: 0 56px; display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,4,20,0.92);
    backdrop-filter: blur(8px);
  }
  .rodape .logo { height: 24px; width: auto; opacity: 0.9; }
  .rodape .num {
    font-family: 'Outfit', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(151,85,255,0.6);
  }
</style>
</head>
<body>
<div class="canvas">
  <img class="bg-slice" src="../assets/slices/slice-03.jpg" alt="">
  <div class="overlay"></div>
  <div class="noise"></div>
  <div class="card">
    <div class="label">02</div>
    <div class="headline">Integrações quebram. Ninguém sabe por quê.</div>
    <div class="body-text">Manutenção constante de fluxo é sintoma de sistema legado.</div>
  </div>
  <div class="rodape">
    <img class="logo" src="../../../logo.png" alt="SalvaTech">
    <span class="num">03 / 07</span>
  </div>
</div>
</body>
</html>
