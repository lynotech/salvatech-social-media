<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Syne:wght@800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #0a0414; }
  .canvas { position: relative; width: 1080px; height: 1350px; overflow: hidden; }

  .bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }

  /* Overlay centralizado — texto no meio, imagem visível nas bordas */
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse 80% 60% at 50% 45%, rgba(10,4,20,0.88) 0%, rgba(10,4,20,0.3) 100%);
    z-index: 1;
  }

  .texto {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-55%);
    z-index: 2; text-align: center; width: 85%;
  }
  .label {
    font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600;
    letter-spacing: 0.3em; text-transform: uppercase; color: #9755FF;
    margin-bottom: 28px;
  }
  .headline {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 100px; line-height: 0.92; text-transform: uppercase;
  }
  .headline .l1 { color: #fff; display: block; text-shadow: 0 4px 60px rgba(0,0,0,0.7); }
  .headline .l2 { color: #9755FF; display: block; text-shadow: 0 4px 40px rgba(151,85,255,0.4); }
  .sub {
    font-family: 'Outfit', sans-serif; font-size: 26px; color: #c49aff;
    margin-top: 28px; font-weight: 300;
  }

  .rodape {
    position: absolute; bottom: 0; width: 100%; height: 72px; z-index: 3;
    display: flex; align-items: center; justify-content: center;
    background: rgba(10,4,20,0.92);
  }
  .rodape .logo { height: 36px; width: auto; }
</style>
</head>
<body>
<div class="canvas">
  <img class="bg" src="/posts/2026-04-09-5-sinais-sistema-travando/assets/capa.jpg" alt="">
  <div class="overlay"></div>
  <div class="texto">
    <div class="label">GESTAO & TECNOLOGIA</div>
    <div class="headline">
      <span class="l1">SEU SISTEMA</span>
      <span class="l2">TE TRAI</span>
    </div>
    <div class="sub">5 sinais que voce ja normalizou</div>
  </div>
  <div class="rodape">
    <img class="logo" src="/logo.png" alt="SalvaTech">
  </div>
</div>
</body>
</html>
