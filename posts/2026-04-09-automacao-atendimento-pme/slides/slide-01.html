<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Outfit:wght@300;400;600;800;900&family=Syne:wght@800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #0a0414; }

  .canvas {
    position: relative; width: 1080px; height: 1350px; overflow: hidden;
  }

  /* Panoramic slice — full bleed background */
  .bg-slice {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 0;
  }

  /* Gradient overlay — fades from solid dark top to transparent bottom */
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 60%;
    background: linear-gradient(
      180deg,
      rgba(10,4,20,0.92) 0%,
      rgba(10,4,20,0.75) 40%,
      rgba(10,4,20,0.3) 75%,
      transparent 100%
    );
    z-index: 1;
  }

  /* Subtle noise texture */
  .noise {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0.03; z-index: 5; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  /* Content */
  .texto {
    position: relative; z-index: 2;
    padding: 56px 56px 0;
  }

  .label {
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.25em;
    text-transform: uppercase; color: #9755FF;
    margin-bottom: 20px;
    display: inline-block;
    padding: 6px 16px;
    border: 1px solid rgba(151,85,255,0.3);
    border-radius: 4px;
    background: rgba(151,85,255,0.06);
  }

  .headline {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 92px; line-height: 0.95;
    text-transform: uppercase;
    letter-spacing: -0.02em;
  }
  .headline .l1 {
    color: #ffffff;
    display: block;
    text-shadow: 0 0 80px rgba(255,255,255,0.08);
  }
  .headline .l2 {
    color: #9755FF;
    display: block;
    text-shadow: 0 0 60px rgba(151,85,255,0.25);
  }

  .sub {
    font-family: 'Outfit', sans-serif;
    font-size: 21px; color: #c49aff; letter-spacing: 0.02em;
    margin-top: 24px; font-weight: 300;
    line-height: 1.4;
    max-width: 85%;
  }

  /* Accent line */
  .accent-line {
    position: absolute; left: 56px; top: 48px;
    width: 40px; height: 3px;
    background: linear-gradient(90deg, #9755FF, #c49aff);
    border-radius: 2px; z-index: 2;
  }

  /* Footer */
  .rodape {
    position: absolute; bottom: 0; width: 100%; height: 60px; z-index: 6;
    border-top: 1px solid rgba(151,85,255,0.2);
    padding: 0 56px; display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,4,20,0.92);
    backdrop-filter: blur(8px);
  }
  .rodape .logo { height: 24px; width: auto; opacity: 0.9; }
  .rodape .num {
    font-family: 'Outfit', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(151,85,255,0.6);
  }
</style>
</head>
<body>
<div class="canvas">
  <img class="bg-slice" src="../assets/slices/slice-01.jpg" alt="">
  <div class="overlay"></div>
  <div class="noise"></div>
  <div class="accent-line"></div>
  <div class="texto">
    <div class="label">ATENDIMENTO</div>
    <div class="headline">
      <span class="l1">SEU TIME ATENDE</span>
      <span class="l2">E VOCÊ AINDA PERDE</span>
    </div>
    <div class="sub">Cliente esperando é cliente saindo.</div>
  </div>
  <div class="rodape">
    <img class="logo" src="../../../logo.png" alt="SalvaTech">
    <span class="num">01 / 07</span>
  </div>
</div>
</body>
</html>
