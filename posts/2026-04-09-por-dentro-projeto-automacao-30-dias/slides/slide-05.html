<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Inter:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #0a0414; font-family: 'Inter', sans-serif; }

  .canvas { position: relative; width: 1080px; height: 1350px; overflow: hidden; }

  .bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,4,20,0.70); z-index: 1;
  }

  .card {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 2;
    background: rgba(17,8,32,0.85); border: 1px solid rgba(151,85,255,0.3);
    border-radius: 16px; padding: 48px; max-width: 860px; width: 85%;
  }
  .label {
    font-size: 12px; font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase; color: #9755FF; margin-bottom: 20px;
  }
  .headline {
    font-family: 'Black Han Sans', 'Impact', 'Arial Black', sans-serif;
    font-weight: 900; font-size: 48px; line-height: 1.1;
    text-transform: uppercase; color: #ffffff; margin-bottom: 24px;
  }
  .body-text {
    font-size: 20px; line-height: 1.6; color: #ccbbee;
  }

  .rodape {
    position: absolute; bottom: 0; width: 100%; height: 64px; z-index: 3;
    border-top: 1px solid rgba(151,85,255,0.35);
    padding: 0 60px; display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,4,20,0.9);
  }
  .rodape .logo {
    height: 28px; width: auto;
  }
  .rodape .num {
    font-size: 11px; font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase; color: #9980cc;
  }
</style>
</head>
<body>
<div class="canvas">
  <img class="bg" src="../assets/background.jpg" alt="">
  <div class="overlay"></div>
  <div class="card">
    <div class="label">SEMANA 04</div>
    <div class="headline">Testes, ajustes e go-live em producao</div>
    <div class="body-text">Tres rodadas de teste com o time do cliente antes de ligar a chave definitivamente.</div>
  </div>
  <div class="rodape">
    <img class="logo" src="../../../logo.png" alt="SalvaTech">
    <span class="num">05 / 07</span>
  </div>
</div>
</body>
</html>
