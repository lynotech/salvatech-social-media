<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Inter:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #0a0414; font-family: 'Inter', sans-serif; }

  .canvas { position: relative; width: 1080px; height: 1350px; overflow: hidden; }

  .bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,4,20,0.75); z-index: 1;
  }

  .conteudo {
    position: relative; z-index: 2;
    padding: 80px 60px; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    height: 100%; text-align: center;
  }
  .headline {
    font-family: 'Black Han Sans', 'Impact', 'Arial Black', sans-serif;
    font-weight: 900; font-size: 72px; line-height: 1.0;
    text-transform: uppercase; margin-bottom: 24px;
  }
  .headline .l1 { color: #ffffff; }
  .headline .l2 { color: #9755FF; }
  .body-text {
    font-size: 22px; line-height: 1.6; color: #ccbbee;
    margin-bottom: 40px; max-width: 800px;
  }
  .cta-btn {
    display: inline-block; padding: 20px 48px;
    background: #9755FF; border-radius: 12px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 24px; color: #ffffff; text-transform: uppercase;
    letter-spacing: 2px;
  }

  .rodape {
    position: absolute; bottom: 0; width: 100%; height: 64px; z-index: 3;
    border-top: 1px solid rgba(151,85,255,0.35);
    padding: 0 60px; display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,4,20,0.9);
  }
  .rodape .logo {
    height: 28px; width: auto;
  }
  .rodape .num {
    font-size: 11px; font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase; color: #9980cc;
  }
</style>
</head>
<body>
<div class="canvas">
  <img class="bg" src="{{BG_JPG_PATH}}" alt="">
  <div class="overlay"></div>
  <div class="conteudo">
    <div class="headline">
      <div class="l1">{{ZONA_HEADLINE_L1}}</div>
      <div class="l2">{{ZONA_HEADLINE_L2}}</div>
    </div>
    <div class="body-text">{{ZONA_BODY}}</div>
    <div class="cta-btn">{{ZONA_CTA}}</div>
  </div>
  <div class="rodape">
    <img class="logo" src="../../../logo.png" alt="SalvaTech">
    <span class="num">07 / 07</span>
  </div>
</div>
</body>
</html>
