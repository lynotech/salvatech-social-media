<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Syne:wght@800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #0a0414; }
  .canvas { position: relative; width: 1080px; height: 1350px; overflow: hidden; }

  .bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,4,20,0.55); z-index: 1;
  }

  .num-deco {
    position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
    font-family: 'Syne', sans-serif; font-size: 400px;
    color: #9755FF; opacity: 0.05; font-weight: 800; z-index: 2; line-height: 1;
  }

  .conteudo {
    position: relative; z-index: 3; padding: 0 64px;
    display: flex; flex-direction: column; justify-content: center; height: 100%;
  }
  .label {
    font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 600;
    letter-spacing: 0.3em; text-transform: uppercase; color: #9755FF;
    margin-bottom: 28px; padding-left: 24px; border-left: 4px solid #9755FF;
  }
  .headline {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 64px; line-height: 1.0; text-transform: uppercase; color: #fff;
    margin-bottom: 32px; text-shadow: 0 4px 40px rgba(0,0,0,0.6);
  }
  .body-text {
    font-family: 'Outfit', sans-serif; font-size: 28px; line-height: 1.5;
    color: #c4b5e0; max-width: 820px; font-weight: 300;
  }

  .rodape {
    position: absolute; bottom: 0; width: 100%; height: 72px; z-index: 4;
    display: flex; align-items: center; justify-content: center;
    background: rgba(10,4,20,0.92);
  }
  .rodape .logo { height: 36px; width: auto; }
</style>
</head>
<body>
<div class="canvas">
  <img class="bg" src="{{BG_JPG_PATH}}" alt="">
  <div class="overlay"></div>
  <div class="num-deco">{{SLIDE_NUM}}</div>
  <div class="conteudo">
    <div class="label">{{ZONA_LABEL}}</div>
    <div class="headline">{{ZONA_HEADLINE}}</div>
    <div class="body-text">{{ZONA_BODY}}</div>
  </div>
  <div class="rodape">
    <img class="logo" src="/logo.png" alt="SalvaTech">
  </div>
</div>
</body>
</html>
